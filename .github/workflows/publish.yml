name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: pip install build twine

      - name: Check if version already published
        run: |
          VERSION=$(grep -oE 'version=["\x27][0-9]+\.[0-9]+\.[0-9]+' paykit/setup.py | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "VERSION=$VERSION"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/paykit-sdk/$VERSION/json)
          if [ "$STATUS" = "200" ]; then
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Build
        if: env.SKIP != 'true'
        run: python -m build paykit/

      - name: Publish
        if: env.SKIP != 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload paykit/dist/*

  tarball-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release CDN packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          BASE="cdn-settings/packages"
          DIST="cdn-settings/dist/providers"

          gh release view "$TAG" --json tagName 2>/dev/null || \
            gh release create "$TAG" \
              --tag "$TAG" \
              --title "$TAG" \
              --notes "SDK $TAG" \
              --latest=false

          for FRAMEWORK in "$BASE"/*/; do
            FRAMEWORK_NAME=$(basename "$FRAMEWORK")
            PROVIDERS=()

            for PROVIDER in "$FRAMEWORK"/*/; do
              PROVIDER_NAME=$(basename "$PROVIDER")
              VERSIONS=$(ls "$PROVIDER" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V)
              LATEST=$(echo "$VERSIONS" | tail -1)
              PROVIDERS+=("$PROVIDER_NAME")

              for VERSION in $VERSIONS; do
                ARCHIVE="${FRAMEWORK_NAME}-${PROVIDER_NAME}-${VERSION//./-}.tar.gz"
                tar -czf "$ARCHIVE" -C "$PROVIDER" "$VERSION"
                gh release upload "$TAG" "$ARCHIVE" --clobber

                URL="https://github.com/$REPO/releases/download/$TAG/$ARCHIVE"
                DIR="$DIST/$FRAMEWORK_NAME/$PROVIDER_NAME"
                mkdir -p "$DIR"

                printf '{\n  "provider_name": "%s",\n  "version": "%s",\n  "framework": "%s",\n  "download_url": "%s"\n}\n' \
                  "$PROVIDER_NAME" "$VERSION" "$FRAMEWORK_NAME" "$URL" > "$DIR/$VERSION"

                if [ "$VERSION" = "$LATEST" ]; then
                  printf '{\n  "provider_name": "%s",\n  "version": "latest",\n  "framework": "%s",\n  "download_url": "%s"\n}\n' \
                    "$PROVIDER_NAME" "$FRAMEWORK_NAME" "$URL" > "$DIR/latest"
                fi
              done
            done

            AVAILABLE=$(printf '"%s",' "${PROVIDERS[@]}" | sed 's/,$//')
            mkdir -p "$DIST/$FRAMEWORK_NAME"
            echo "[$AVAILABLE]" > "$DIST/$FRAMEWORK_NAME/available"
          done

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: cdn-settings
          wranglerVersion: "4.105.0"
          command: deploy
