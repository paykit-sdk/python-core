name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install build tools
        run: pip install build twine
      - name: Check if version already published
        run: |
          VERSION=$(python setup.py --version 2>/dev/null)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/paykit-sdk/$VERSION/json)
          if [ "$STATUS" = "200" ]; then
            echo "Version $VERSION already on PyPI, skipping."
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Build
        if: env.SKIP != 'true'
        run: python -m build paykit/

      - name: Publish
        if: env.SKIP != 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload paykit/dist/*

  cdn-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release CDN packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          BASE="cdn-settings/packages"

          # create release if it doesn't exist
          gh release view "$TAG" --json tagName 2>/dev/null || \
            gh release create "$TAG" --title "$TAG" --notes "SDK $TAG"

          for FRAMEWORK in "$BASE"/*/; do
            FRAMEWORK_NAME=$(basename "$FRAMEWORK")
            for PROVIDER in "$FRAMEWORK"/*/; do
              PROVIDER_NAME=$(basename "$PROVIDER")
              VERSIONS=$(ls "$PROVIDER" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V)

              for VERSION in $VERSIONS; do
                ARCHIVE="${FRAMEWORK_NAME}-${PROVIDER_NAME}-${VERSION//./-}.tar.gz"
                tar -czf "$ARCHIVE" -C "$PROVIDER" "$VERSION"
                gh release upload "$TAG" "$ARCHIVE" --clobber
              done

            done
          done
